name: tinder_lince
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.1.2

  # Firebase
  firebase_storage: ^13.1.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: InterTight
      fonts:
        - asset: fonts/InterTight-Regular.ttf
          weight: 400
        - asset: fonts/InterTight-Medium.ttf
          weight: 500
        - asset: fonts/InterTight-SemiBold.ttf
          weight: 600
        - asset: fonts/InterTight-Bold.ttf
          weight: 700
        - asset: fonts/InterTight-ExtraBold.ttf
          weight: 800
        - asset: fonts/InterTight-Italic.ttf
          style: italic
        - asset: fonts/InterTight-BoldItalic.ttf
          weight: 700
          style: italic